<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>hi · by CYUSA</title>
<style>
  /* ─── DESIGN TOKENS ─────────────────────────────── */
  :root {
    --bg:          #0a0a0f;
    --bg2:         #111118;
    --bg3:         #1a1a24;
    --surface:     #16161f;
    --surface2:    #1e1e2a;
    --border:      rgba(255,255,255,0.07);
    --accent:      #6c63ff;
    --accent2:     #4ade80;
    --accent-glow: rgba(108,99,255,0.18);
    --text:        #f0f0f8;
    --text2:       #9090a8;
    --text3:       #5a5a70;
    --danger:      #ff4d4f;
    --online:      #4ade80;
    --bubble-me:   #6c63ff;
    --bubble-them: #1e1e2a;
    --radius:      14px;
    --radius-sm:   8px;
    --shadow:      0 8px 32px rgba(0,0,0,0.48);
    --font:        'Inter', system-ui, sans-serif;
    --transition:  0.2s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="light"] {
    --bg:          #f2f2f7;
    --bg2:         #ffffff;
    --bg3:         #e8e8ef;
    --surface:     #ffffff;
    --surface2:    #f2f2f7;
    --border:      rgba(0,0,0,0.08);
    --text:        #111118;
    --text2:       #555568;
    --text3:       #aaaabc;
    --bubble-them: #e8e8ef;
    --accent-glow: rgba(108,99,255,0.1);
  }

  /* ─── RESET ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }
  img { display: block; max-width: 100%; }
  button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
  input, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; }

  /* ─── APP SHELL ──────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; background: var(--bg); }

  /* ─── SCREENS ────────────────────────────────────── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity var(--transition), transform var(--transition); transform: translateY(12px); }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

  /* ─── AUTH SCREEN ────────────────────────────────── */
  #screen-auth {
    background: var(--bg);
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    gap: 0;
  }
  .auth-logo {
    width: 72px; height: 72px;
    border-radius: 22px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -2px;
    box-shadow: 0 0 40px var(--accent-glow);
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .auth-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .auth-sub { font-size: 13px; color: var(--text2); margin-top: 6px; text-align: center; }
  .auth-brand { font-size: 10px; color: var(--text3); margin-top: 4px; letter-spacing: 1.5px; text-transform: uppercase; }
  .auth-tabs { display: flex; gap: 0; margin: 32px 0 24px; background: var(--surface); border-radius: var(--radius-sm); padding: 4px; width: 100%; }
  .auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 600; border-radius: 6px; color: var(--text2); transition: all var(--transition); }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .auth-form { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .auth-field { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; font-size: 15px; color: var(--text); transition: border-color var(--transition); width: 100%; }
  .auth-field:focus { border-color: var(--accent); }
  .auth-field::placeholder { color: var(--text3); }
  .btn-primary { background: var(--accent); color: #fff; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; width: 100%; transition: opacity var(--transition), transform var(--transition); }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .e2ee-badge { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text3); margin-top: 16px; }
  .e2ee-badge svg { opacity: 0.5; }
  .e2ee-badge span { opacity: 0.7; }

  /* ─── TOPBAR ──────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }
  .topbar-title { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .topbar-actions { display: flex; gap: 8px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--surface); color: var(--text2); transition: background var(--transition), color var(--transition); }
  .icon-btn:active { background: var(--surface2); }
  .topbar-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0; }
  .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ─── SEARCH ──────────────────────────────────────── */
  .search-bar { padding: 8px 16px 12px; flex-shrink: 0; }
  .search-input-wrap { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 20px; padding: 9px 14px; border: 1px solid var(--border); }
  .search-input-wrap svg { opacity: 0.4; flex-shrink: 0; }
  .search-input-wrap input { flex: 1; font-size: 14px; }
  .search-input-wrap input::placeholder { color: var(--text3); }

  /* ─── SCROLL AREA ────────────────────────────────── */
  .scroll { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
  .scroll::-webkit-scrollbar { display: none; }

  /* ─── CHAT LIST ───────────────────────────────────── */
  .chat-item { display: flex; align-items: center; gap: 13px; padding: 12px 20px; transition: background var(--transition); cursor: pointer; position: relative; }
  .chat-item:active { background: var(--surface); }
  .chat-item + .chat-item { border-top: 1px solid var(--border); }
  .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--surface2); flex-shrink: 0; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: var(--text); }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .online-dot { position: absolute; bottom: 2px; right: 2px; width: 11px; height: 11px; border-radius: 50%; background: var(--online); border: 2px solid var(--bg); }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .chat-preview { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
  .e2ee-icon { color: var(--accent2); }
  .chat-meta { text-align: right; flex-shrink: 0; }
  .chat-time { font-size: 11px; color: var(--text3); }
  .chat-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 2px 6px; margin-top: 4px; display: inline-block; }

  /* ─── CHAT WINDOW ─────────────────────────────────── */
  #screen-chat { background: var(--bg); }
  .chat-topbar { display: flex; align-items: center; gap: 11px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .chat-topbar .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .chat-peer-info { flex: 1; }
  .chat-peer-name { font-size: 15px; font-weight: 600; }
  .chat-peer-status { font-size: 12px; color: var(--text2); margin-top: 1px; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); display: inline-block; }
  .e2ee-banner { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 16px; background: rgba(108,99,255,0.06); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .messages-area::-webkit-scrollbar { display: none; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-bubble { max-width: 72%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45; position: relative; }
  .msg-row.me .msg-bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 4px; }
  .msg-row.them .msg-bubble { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10px; opacity: 0.55; margin-top: 4px; display: block; text-align: right; }
  .msg-row.them .msg-time { text-align: left; }
  .msg-img { border-radius: 12px; overflow: hidden; max-width: 220px; margin-bottom: 4px; }
  .msg-img img { width: 100%; }
  .msg-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .msg-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: var(--bubble-them); border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .chat-composer { display: flex; align-items: flex-end; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .composer-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; font-size: 14px; resize: none; max-height: 100px; line-height: 1.4; }
  .composer-input:focus { border-color: var(--accent); }
  .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; transition: transform var(--transition), opacity var(--transition); }
  .send-btn:active { transform: scale(0.9); }
  .attach-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--text3); flex-shrink: 0; }
  .date-divider { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; }
  .autosave-toast { position: absolute; top: 60px; right: 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .autosave-toast.show { opacity: 1; }

  /* ─── FEED ────────────────────────────────────────── */
  .post-card { border-bottom: 1px solid var(--border); }
  .post-header { display: flex; align-items: center; gap: 11px; padding: 13px 16px 10px; }
  .post-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
  .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .post-username { font-size: 14px; font-weight: 600; }
  .post-location { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .post-more { margin-left: auto; color: var(--text3); }
  .post-image { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--surface); }
  .post-image.wide { aspect-ratio: 4/3; }
  .post-actions { display: flex; align-items: center; gap: 16px; padding: 12px 16px 8px; }
  .action-btn { display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 14px; font-weight: 500; transition: color var(--transition); }
  .action-btn.liked { color: #ff4d6d; }
  .action-btn.liked svg { fill: #ff4d6d; }
  .bookmark-btn { margin-left: auto; }
  .post-caption { padding: 0 16px 8px; font-size: 14px; line-height: 1.5; }
  .post-caption strong { font-weight: 600; }
  .post-comments-count { padding: 0 16px 6px; font-size: 13px; color: var(--text2); cursor: pointer; }
  .post-time { padding: 0 16px 14px; font-size: 11px; color: var(--text3); letter-spacing: 0.3px; }

  /* Upload post area */
  .create-post-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .create-post-input { flex: 1; background: var(--surface); border-radius: 20px; padding: 10px 16px; font-size: 14px; color: var(--text2); border: 1px solid var(--border); cursor: pointer; }

  /* Comments drawer */
  .comments-drawer { position: absolute; bottom: 56px; left: 0; right: 0; max-height: 55vh; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; border-top: 1px solid var(--border); box-shadow: var(--shadow); display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 50; }
  .comments-drawer.open { transform: translateY(0); }
  .drawer-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 10px auto 8px; flex-shrink: 0; }
  .drawer-title { padding: 0 16px 10px; font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--border); }
  .comments-list { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 14px; }
  .comments-list::-webkit-scrollbar { display: none; }
  .comment-row { display: flex; gap: 10px; }
  .comment-av { width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; overflow: hidden; }
  .comment-av img { width: 100%; height: 100%; object-fit: cover; }
  .comment-body { font-size: 13px; line-height: 1.5; }
  .comment-body strong { font-weight: 600; }
  .comment-time { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .drawer-composer { display: flex; gap: 10px; align-items: center; padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .drawer-input { flex: 1; background: var(--surface2); border-radius: 20px; padding: 9px 14px; font-size: 14px; border: 1px solid var(--border); }
  .drawer-input:focus { border-color: var(--accent); outline: none; }

  /* ─── PROFILE ─────────────────────────────────────── */
  .profile-hero { display: flex; flex-direction: column; align-items: center; padding: 28px 20px 20px; border-bottom: 1px solid var(--border); }
  .profile-av-wrap { position: relative; width: 84px; height: 84px; }
  .profile-av { width: 84px; height: 84px; border-radius: 50%; background: var(--surface2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 700; border: 3px solid var(--accent); }
  .profile-av img { width: 100%; height: 100%; object-fit: cover; }
  .profile-av-edit { position: absolute; bottom: 0; right: 0; width: 26px; height: 26px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
  .profile-name { font-size: 20px; font-weight: 700; margin-top: 13px; letter-spacing: -0.3px; }
  .profile-handle { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .profile-stats { display: flex; gap: 0; margin-top: 18px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; width: 100%; }
  .stat-item { flex: 1; text-align: center; padding: 12px 8px; }
  .stat-item + .stat-item { border-left: 1px solid var(--border); }
  .stat-num { font-size: 17px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .profile-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
  .setting-row { display: flex; align-items: center; gap: 13px; padding: 11px 0; cursor: pointer; }
  .setting-row + .setting-row { border-top: 1px solid var(--border); }
  .setting-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text2); }
  .setting-icon.accent { background: rgba(108,99,255,0.12); color: var(--accent); }
  .setting-icon.green { background: rgba(74,222,128,0.12); color: var(--accent2); }
  .setting-icon.red { background: rgba(255,77,79,0.1); color: var(--danger); }
  .setting-text { flex: 1; font-size: 14px; font-weight: 500; }
  .setting-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .setting-chevron { color: var(--text3); }
  .toggle { width: 44px; height: 26px; border-radius: 13px; background: var(--surface2); border: 1px solid var(--border); position: relative; cursor: pointer; transition: background var(--transition); flex-shrink: 0; }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: transform var(--transition); }
  .toggle.on::after { transform: translateX(18px); }
  .security-banner { margin: 16px 20px; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: var(--radius-sm); padding: 13px 15px; display: flex; gap: 11px; align-items: flex-start; }
  .security-banner-icon { color: var(--accent2); margin-top: 1px; flex-shrink: 0; }
  .security-banner-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .security-banner-text strong { color: var(--text); font-weight: 600; }

  /* ─── BOTTOM NAV ──────────────────────────────────── */
  .bottom-nav { display: flex; align-items: center; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 8px 8px; gap: 4px; color: var(--text3); transition: color var(--transition); position: relative; }
  .nav-item.active { color: var(--accent); }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }
  .nav-badge { position: absolute; top: 7px; right: calc(50% - 18px); background: var(--danger); color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 5px; border: 2px solid var(--bg); }

  /* ─── MODAL ───────────────────────────────────────── */
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: flex-end; z-index: 200; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet { background: var(--s
