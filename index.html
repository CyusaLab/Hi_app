<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" id="dynamic-favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%237C3AED'/><text y='70' x='20' fill='white' font-family='sans-serif' font-size='60' font-weight='bold'>hi</text></svg>">
    <meta name="theme-color" content="#7C3AED">
</head>
<body class="light-mode">
    <!-- Auth Screens -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1 class="logo">hi</h1>
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email or Phone">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn-primary" onclick="App.handleLogin()">Login</button>
                <p>New here? <span class="link" onclick="App.toggleAuth()">Register</span></p>
            </div>
            <div id="register-form" style="display:none">
                <div class="avatar-upload">
                    <label for="reg-avatar">
                        <div id="avatar-preview">📸</div>
                    </label>
                    <input type="file" id="reg-avatar" hidden accept="image/*" onchange="App.previewAvatar(this)">
                </div>
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="email" id="reg-email" placeholder="Email/Phone">
                <input type="password" id="reg-pass" placeholder="Password">
                <button class="btn-primary" onclick="App.handleRegister()">Create Account</button>
                <p>Have an account? <span class="link" onclick="App.toggleAuth()">Login</span></p>
            </div>
            <footer class="branding-footer">Built by CYUSA</footer>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="main-app" class="screen">
        <header class="app-header">
            <h2 id="header-title">hi</h2>
            <div class="header-actions">
                <button id="theme-toggle" onclick="App.toggleTheme()">🌓</button>
            </div>
        </header>

        <main id="content-area">
            <!-- Content injected by app.js -->
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="App.navigate('chats')" data-tab="chats">
                <span class="icon">💬</span>
                <span>Chats</span>
            </div>
            <div class="nav-item" onclick="App.navigate('feed')" data-tab="feed">
                <span class="icon">📸</span>
                <span>Feed</span>
            </div>
            <div class="nav-item" onclick="App.navigate('profile')" data-tab="profile">
                <span class="icon" id="nav-avatar-icon">👤</span>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <!-- Modals & Drawers -->
    <div id="modal-overlay" onclick="App.closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
